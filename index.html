<script>
  const SKILLS = [
    { id:'html', title:'HTML & CSS', meta:'Responsive layouts, Flexbox, Grid', cat:'frontend' },
    { id:'js', title:'JavaScript', meta:'ES6+, DOM, async', cat:'frontend' },
    { id:'react', title:'React', meta:'Hooks, Router, state', cat:'frontend' },
    { id:'node', title:'Node.js', meta:'APIs, Express', cat:'backend' },
    { id:'mongo', title:'MongoDB', meta:'Schemas & aggregation', cat:'backend' },
    { id:'tools', title:'Tools', meta:'Git, Docker, CI', cat:'tools' },
  ];

  const PROJECTS = [
    {
      id:'tasteheaven',
      title:'Taste Heaven (Restaurant App)',
      desc:'Full-stack restaurant site with menu, cart and orders. Built using Node.js, MongoDB, and HTML/CSS.',
      tags:['Node','MongoDB','HTML'],
      img:'image/penne-alfredo-pasta.jpg',
      demo:'#', repo:'#'
    },
    {
      id:'fruitshop',
      title:'Ramji Fruit & Veggie Shop',
      desc:'A full-stack e-commerce web app for an online fruit and vegetable store. Developed using HTML, CSS, JavaScript, Node.js, and MongoDB.',
      tags:['Node.js','MongoDB','HTML','CSS','JavaScript'],
      img:'image/Margherita Pizza.png',
      demo:'https://guptadeepak155.github.io/Ramji-Fruit-Veggie-Shop/',
      repo:'https://github.com/guptadeepak155/Ramji-Fruit-Veggie-Shop'
    },
    {
      id:'society',
      title:'Society Management System',
      desc:'PHP & MySQL web app to manage residents, maintenance, and communication efficiently.',
      tags:['PHP','MySQL','Bootstrap'],
      img:'image/Chocolate Brownie.jpg',
      demo:'#', repo:'#'
    }
  ];

  function renderSkills(filter = 'all') {
    const grid = document.getElementById('skillsGrid');
    grid.innerHTML = SKILLS
      .filter(s => filter === 'all' || s.cat === filter)
      .map(s => `
        <div class="skill-card">
          <div class="skill-title">${s.title}</div>
          <div class="skill-meta">${s.meta}</div>
        </div>
      `).join('');
  }

  function renderProjects() {
    const grid = document.getElementById('projectsGrid');
    grid.innerHTML = PROJECTS.map(p => `
      <article class="project-card">
        <img src="${p.img}" alt="${p.title}" class="project-media" />
        <div class="project-body">
          <strong>${p.title}</strong>
          <p>${p.desc}</p>
          <div>${p.tags.map(t => `<span class="tag">${t}</span>`).join(' ')}</div>
          <div style="margin-top:auto;display:flex;gap:8px;">
            <a class="btn ghost" href="${p.demo}" target="_blank">Live</a>
            <a class="btn ghost" href="${p.repo}" target="_blank">Repo</a>
          </div>
        </div>
      </article>
    `).join('');
  }

  document.addEventListener('click', e => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    renderSkills(chip.dataset.filter);
  });

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  document.addEventListener('DOMContentLoaded', () => {
    renderSkills();
    renderProjects();
    document.getElementById('year').textContent = new Date().getFullYear();
  });
</script>
